<mat-toolbar color="primary" class="navbar">
   <button mat-icon-button [matMenuTriggerFor]="opcoesMenu" aria-label="Menu de opções">
    <mat-icon>menu</mat-icon>
  </button>

  <a class="navbar-title nav-link" routerLink="/torcedores">Todos Torcendo pela Copa!</a>


</mat-toolbar>
<mat-menu #opcoesMenu="matMenu">
  <button mat-menu-item routerLink="/torcedores">
    <mat-icon>sports_soccer</mat-icon>
    <span>Top Países</span>
  </button>

  <button mat-menu-item routerLink="/times">
    <mat-icon>compare_arrows</mat-icon>
    <span>Mostrar os Times</span>
  </button>

  <button mat-menu-item routerLink="/auth/login">
    <mat-icon color="warn">logout</mat-icon>
    <span class="text-danger">Sair</span>
  </button>
</mat-menu>
